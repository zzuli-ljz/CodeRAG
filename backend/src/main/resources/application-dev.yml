# ==========================================================
# 本地开发 Profile（H2 内嵌数据库）
# 激活方式：--spring.profiles.active=dev
# 线上部署：不激活此 profile，自动走默认 PostgreSQL 配置
# ==========================================================

spring:
  datasource:
    url: jdbc:h2:mem:coderag;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: create-drop   # H2 内存库每次重启自动建表
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# 关闭数据库迁移脚本（H2 不支持 pgvector 语法）
app:
  db-migration:
    enabled: false
